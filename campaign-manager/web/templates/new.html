<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Campaign — Phish Manager</title>
<style>
:root {
  --bg: #090c10;
  --surface: #11161e;
  --border: #1e2530;
  --text: #a1aab3;
  --text-bright: #e8ecf1;
  --green: #26a641;
  --blue: #4199f5;
  --purple: #8b6ff0;
  --amber: #e8953b;
  --red: #f5534b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.container { max-width: 600px; margin: 0 auto; padding: 48px 24px; }
h1 { font-size: 24px; font-weight: 600; color: var(--text-bright); margin-bottom: 28px; }

.form-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 28px;
}
.form-group { margin-bottom: 20px; }
.form-group:last-of-type { margin-bottom: 24px; }
label {
  display: block; font-size: 13px; font-weight: 500;
  color: var(--text-bright); margin-bottom: 6px;
}
input, select {
  width: 100%; padding: 10px 12px; border-radius: 6px;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text-bright); font-size: 14px; font-family: inherit;
  outline: none; transition: border-color 0.15s;
}
input:focus, select:focus { border-color: var(--blue); }
select option { background: var(--surface); color: var(--text-bright); }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 22px; border-radius: 6px; font-size: 14px; font-weight: 500;
  text-decoration: none; cursor: pointer; border: none;
  font-family: inherit; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--blue); color: #fff; }
.btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
.form-actions { display: flex; gap: 12px; align-items: center; }

.back { margin-bottom: 20px; }
.back a { color: var(--text); text-decoration: none; font-size: 14px; }
.back a:hover { color: var(--text-bright); }
</style>
</head>
<body>
<div class="container">
  <div class="back"><a href="/">&larr; Back to campaigns</a></div>
  <h1>New Campaign</h1>

  <form method="POST" action="/api/campaigns">
    <div class="form-card">
      <div class="form-group">
        <label for="name">Campaign Name</label>
        <input type="text" id="name" name="name" required
               placeholder="e.g. Q4 Credential Harvest" autofocus>
      </div>

      <div class="form-group">
        <label for="lure">Lure Template</label>
        <select id="lure" name="lure" required>
          <option value="">— Select a lure —</option>
          {{range .Lures}}
          <option value="{{.Filename}}">{{.Brand}} ({{.Filename}})</option>
          {{end}}
        </select>
      </div>

      <div class="form-group">
        <label for="phishlet">Phishlet</label>
        <select id="phishlet" name="phishlet" required>
          <option value="">— Select a phishlet —</option>
          {{range .Phishlets}}
          <option value="{{.Name}}">{{.Label}}</option>
          {{end}}
        </select>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Create Campaign</button>
        <a href="/" class="btn btn-ghost">Cancel</a>
      </div>
    </div>
  </form>
</div>
</body>
</html>
